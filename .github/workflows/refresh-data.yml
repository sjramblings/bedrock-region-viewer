name: Refresh Bedrock catalog

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    env:
      ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      REGION: ${{ secrets.AWS_REGION }}
    steps:
      - id: check
        run: |
          if [ -z "${ROLE_ARN:-}" ] || [ -z "${REGION:-}" ]; then
            echo "::warning::Skipping refresh. Add repo secrets AWS_ROLE_ARN and AWS_REGION after deploying infra/github-oidc-role.yaml. See README."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

  refresh:
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: bedrock-region-viewer-refresh
          mask-aws-account-id: true

      - name: Save previous snapshot
        run: cp public/data.json /tmp/previous.json

      - name: Snapshot Bedrock catalog
        run: bun run fetch

      - name: Diff catalog against previous snapshot
        id: diff
        run: |
          set -euo pipefail
          RESULT=$(bun run scripts/diff-data.ts /tmp/previous.json public/data.json)
          HAS=$(echo "$RESULT" | jq -r .hasChanges)
          echo "changed=$HAS" >> "$GITHUB_OUTPUT"
          if [ "$HAS" = "true" ]; then
            echo "$RESULT" | jq -r .title > /tmp/issue-title.txt
            echo "$RESULT" | jq -r .body > /tmp/issue-body.md
            {
              echo "## Catalog changes detected"
              echo "$RESULT" | jq -r .body
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No model availability changes." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Open PR and create tracking issue
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          DATE=$(date -u +%Y-%m-%d-%H%M)
          BRANCH="data/nightly-${DATE}"
          PR_CREATED=0

          # If anything fails after we've pushed the branch but before the PR
          # exists, delete the orphan branch so the remote stays clean. Past
          # failures (e.g. "GitHub Actions is not permitted to create or
          # approve pull requests" when the repo setting is off) left these
          # branches lingering.
          cleanup() {
            local rc=$?
            if [ "$rc" -ne 0 ] && [ "$PR_CREATED" -eq 0 ]; then
              echo "::warning::PR creation did not complete. Deleting orphan branch ${BRANCH}."
              git push origin --delete "${BRANCH}" 2>/dev/null || true
            fi
            return $rc
          }
          trap cleanup EXIT

          git config user.name "bedrock-catalog-bot"
          git config user.email "bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add public/data.json
          git commit -m "chore(data): nightly Bedrock catalog refresh ${DATE}"
          git push -u origin "$BRANCH"

          # Ensure labels exist (idempotent).
          gh label create model-changes --color FBCA04 --description "Automated alert when Bedrock catalog model/profile availability changes" --force >/dev/null
          gh label create automated --color EDEDED --description "Opened by automation" --force >/dev/null

          # Create the tracking issue first; capture URL to link from the PR.
          # Issue creation does not require the "Allow Actions to create PRs"
          # repo setting, so this still fires even if PR creation is blocked.
          ISSUE_URL=$(gh issue create \
            --title "$(cat /tmp/issue-title.txt)" \
            --body-file /tmp/issue-body.md \
            --label model-changes,automated)

          # PR body references the issue.
          {
            echo "Automated nightly refresh of \`public/data.json\` from the AWS Bedrock APIs."
            echo ""
            echo "Model availability changes tracked in ${ISSUE_URL}."
            echo ""
            echo "This PR only modifies \`public/data.json\`. Auto-merge is enabled; it will squash-merge once required checks pass."
          } > /tmp/pr-body.md

          # gh pr create can fail with a confusing error when the repo
          # setting "Allow GitHub Actions to create and approve pull requests"
          # is OFF (Settings -> Actions -> General -> Workflow permissions).
          # workflow `permissions: pull-requests: write` is necessary but not
          # sufficient on its own.
          if ! gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(data): nightly refresh ${DATE}" \
            --body-file /tmp/pr-body.md \
            --label automated; then
            echo "::error::gh pr create failed. Most likely cause: the repo setting 'Allow GitHub Actions to create and approve pull requests' is OFF. Enable it at: Settings -> Actions -> General -> Workflow permissions. The orphan branch ${BRANCH} will be deleted automatically; the tracking issue ${ISSUE_URL} remains as a record of the catalog change."
            exit 1
          fi
          PR_CREATED=1

          gh pr merge --auto --squash --delete-branch "$BRANCH"
